<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>wow3-renderer — Admin</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600" rel="stylesheet">
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
  <script type="module" src="https://cdn.jsdelivr.net/npm/wox-gui@0.2.2/dist/wox-gui.cdn.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { zoom: 1.2; }
    body {
      font-family: var(--wox-font);
      background: var(--wox-bg-app);
      color: var(--wox-text-primary);
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    #main { display: none; flex-direction: column; flex: 1; overflow: hidden; }
    #main.visible { display: flex; }

    /* Table styles */
    .data-table {
      width: 100%;
      border-collapse: collapse;
      font-size: var(--wox-font-size-base);
    }
    .data-table th {
      background: var(--wox-bg-section-header);
      color: var(--wox-text-secondary);
      font-weight: 500;
      text-align: left;
      padding: 8px 12px;
      border-bottom: 1px solid var(--wox-border);
      white-space: nowrap;
    }
    .data-table td {
      padding: 8px 12px;
      border-bottom: 1px solid var(--wox-border-section);
      color: var(--wox-text-primary);
      vertical-align: middle;
    }
    .data-table tr:hover td { background: var(--wox-bg-hover); }
    .table-wrap { overflow-y: auto; flex: 1; }
    .tab-content {
      display: flex;
      flex-direction: column;
      height: 100%;
      gap: 12px;
      padding: 16px;
      overflow: hidden;
    }
    .toolbar { display: flex; align-items: center; gap: 8px; }
    .badge-status {
      display: inline-block;
      padding: 2px 8px;
      border-radius: var(--wox-radius-sm);
      font-size: var(--wox-font-size-sm);
      font-weight: 500;
    }
    .s-pending  { background: #333; color: #aaa; }
    .s-running  { background: #1a3a5c; color: var(--wox-accent); }
    .s-completed { background: #1a3c2a; color: #4cc9f0; }
    .s-failed   { background: #3c1a1a; color: var(--wox-danger); }
    .btn-action {
      background: none; border: 1px solid var(--wox-border);
      color: var(--wox-text-secondary); padding: 3px 8px;
      border-radius: var(--wox-radius-sm); cursor: pointer;
      font-size: var(--wox-font-size-sm);
    }
    .btn-action:hover { border-color: var(--wox-accent); color: var(--wox-accent); }
    .btn-danger:hover { border-color: var(--wox-danger); color: var(--wox-danger); }
    .btn-action:disabled {
      opacity: 0.4; cursor: not-allowed;
      border-color: var(--wox-border); color: var(--wox-text-secondary);
    }
    .key-mask { font-family: var(--wox-font-mono); color: var(--wox-text-secondary); }
    .page-select {
      background: var(--wox-bg-input);
      border: 1px solid var(--wox-border);
      color: var(--wox-text-primary);
      padding: 3px 6px;
      border-radius: var(--wox-radius-sm);
      font-size: var(--wox-font-size-sm);
      font-family: var(--wox-font);
    }
    .page-info {
      color: var(--wox-text-secondary);
      font-size: var(--wox-font-size-sm);
      min-width: 90px;
      text-align: center;
    }
    .row-check, .col-check {
      width: 14px; height: 14px;
      accent-color: var(--wox-accent);
      cursor: pointer;
      vertical-align: middle;
    }
    .col-check-cell { width: 32px; text-align: center; }
  </style>
</head>
<body>

<!-- Login modal (shown until authenticated) -->
<wox-modal id="loginModal" open title="wow3-renderer Admin" closable="false" width="340px">
  <div style="display:flex; flex-direction:column; gap:12px; padding:4px 0">
    <wox-input id="loginUser" type="text" label="Username" placeholder="admin"></wox-input>
    <wox-input id="loginPass" type="password" label="Password" placeholder="Password"></wox-input>
  </div>
  <div slot="footer" style="display:flex; justify-content:flex-end">
    <wox-button id="loginBtn" variant="text" icon="login" label="Sign In"></wox-button>
  </div>
</wox-modal>

<!-- Main interface (hidden until logged in) -->
<div id="main">
  <wox-menubar>
    <span style="font-weight:600; color:var(--wox-text-hi); padding:0 16px; font-size:var(--wox-font-size-lg)">
      wow3-renderer
    </span>
    <div style="flex:1"></div>
    <wox-button id="logoutBtn" variant="text" icon="logout" label="Logout"
      style="margin-right:8px"></wox-button>
  </wox-menubar>

  <div style="flex:1; overflow:hidden; display:flex; flex-direction:column;">
    <wox-tabs id="tabs" active="jobs" style="flex:1; overflow:hidden;">

      <!-- Jobs tab -->
      <wox-tab name="jobs" label="Jobs" icon="video_file">
        <div class="tab-content">
          <div class="toolbar">
            <span style="color:var(--wox-text-secondary); font-size:var(--wox-font-size-sm)" id="jobsStatus">
              Loading...
            </span>
            <button id="bulkDeleteBtn" class="btn-action btn-danger" disabled>
              Delete Selected (<span id="bulkCount">0</span>)
            </button>
            <div style="flex:1"></div>
            <label style="color:var(--wox-text-secondary); font-size:var(--wox-font-size-sm)">
              Per page:
              <select id="pageSize" class="page-select">
                <option value="10">10</option>
                <option value="25" selected>25</option>
                <option value="50">50</option>
                <option value="100">100</option>
                <option value="0">All</option>
              </select>
            </label>
            <wox-button id="prevPageBtn" variant="icon" icon="chevron_left"></wox-button>
            <span class="page-info" id="pageInfo">1 / 1</span>
            <wox-button id="nextPageBtn" variant="icon" icon="chevron_right"></wox-button>
            <wox-button id="refreshBtn" variant="icon" icon="refresh"></wox-button>
          </div>
          <div class="table-wrap">
            <table class="data-table">
              <thead>
                <tr>
                  <th class="col-check-cell"><input type="checkbox" id="selectAll" class="col-check"></th>
                  <th>ID</th>
                  <th>File</th>
                  <th>Status</th>
                  <th>Progress</th>
                  <th>Created</th>
                  <th>Running Time</th>
                  <th>Duration</th>
                  <th>Actions</th>
                </tr>
              </thead>
              <tbody id="jobsBody"></tbody>
            </table>
          </div>
        </div>
      </wox-tab>

      <!-- API Keys tab -->
      <wox-tab name="keys" label="API Keys" icon="key">
        <div class="tab-content">
          <div class="toolbar">
            <wox-button id="newKeyBtn" variant="text" icon="add" label="New API Key"></wox-button>
          </div>
          <div class="table-wrap">
            <table class="data-table">
              <thead>
                <tr>
                  <th>Label</th>
                  <th>Created</th>
                  <th>Actions</th>
                </tr>
              </thead>
              <tbody id="keysBody"></tbody>
            </table>
          </div>
        </div>
      </wox-tab>

    </wox-tabs>
  </div>

  <wox-statusbar>
    <span slot="left" id="statusLeft">Ready</span>
  </wox-statusbar>
</div>

<!-- New API Key modal -->
<wox-modal id="newKeyModal" title="New API Key" width="360px">
  <div style="display:flex; flex-direction:column; gap:12px; padding:4px 0">
    <wox-input id="keyLabel" type="text" label="Label" placeholder="e.g. n8n production"></wox-input>
  </div>
  <div slot="footer" style="display:flex; gap:8px; justify-content:flex-end">
    <wox-button id="newKeyCancel" variant="text" label="Cancel"></wox-button>
    <wox-button id="newKeyConfirm" variant="text" icon="add" label="Create"></wox-button>
  </div>
</wox-modal>

<!-- Created key display modal -->
<wox-modal id="createdKeyModal" title="API Key Created" width="480px" closable="false">
  <div style="display:flex; flex-direction:column; gap:12px; padding:4px 0">
    <p style="color:var(--wox-text-secondary); font-size:var(--wox-font-size-base)">
      Copy this key now — it will not be shown again.
    </p>
    <div style="display:flex; gap:8px; align-items:center">
      <wox-input id="createdKeyValue" type="text" style="flex:1"></wox-input>
      <wox-button id="copyKeyBtn" variant="icon" icon="content_copy"></wox-button>
    </div>
  </div>
  <div slot="footer" style="display:flex; justify-content:flex-end">
    <wox-button id="createdKeyClose" variant="text" label="Done"></wox-button>
  </div>
</wox-modal>

<!-- Delete confirmation modal -->
<wox-modal id="confirmModal" title="Confirm Delete" width="340px">
  <p id="confirmMsg" style="color:var(--wox-text-secondary)"></p>
</wox-modal>

<script type="module">
// ── API helpers ──────────────────────────────────────────────────────────────

async function api(method, path, body) {
  const opts = { method, headers: {} };
  if (body) {
    opts.headers['Content-Type'] = 'application/json';
    opts.body = JSON.stringify(body);
  }
  const res = await fetch(path, opts);
  const json = await res.json().catch(() => ({}));
  if (!res.ok) throw new Error(json.error || `HTTP ${res.status}`);
  return json;
}

/** Escape HTML to prevent XSS from user-supplied strings in innerHTML */
function esc(s) {
  return String(s)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

// ── State ────────────────────────────────────────────────────────────────────

let refreshTimer = null;
let allJobs = [];
let selectedIds = new Set();
let currentPage = 1;
let pageSize = Number(localStorage.getItem('wow3_pageSize') ?? 25);

// ── Formatting helpers ───────────────────────────────────────────────────────

function fmtDate(ms) {
  if (!ms) return '—';
  return new Date(ms).toLocaleString();
}

function fmtDuration(startMs, endMs) {
  if (!startMs || !endMs) return '—';
  const s = Math.round((endMs - startMs) / 1000);
  const m = Math.floor(s / 60);
  return m > 0 ? `${m}m ${s % 60}s` : `${s}s`;
}

/**
 * Format elapsed running time for a job.
 * Shows live elapsed time for running jobs, dash otherwise.
 * @param {Object} j - job record
 * @returns {string}
 */
function fmtRunningTime(j) {
  if (j.status !== 'running' || !j.started_at) return '—';
  return fmtDuration(j.started_at, Date.now());
}

// ── Login ────────────────────────────────────────────────────────────────────

document.getElementById('loginBtn').addEventListener('wox-click', async () => {
  const username = document.getElementById('loginUser').value;
  const password = document.getElementById('loginPass').value;
  try {
    await api('POST', '/admin/login', { username, password });
    document.getElementById('loginModal').removeAttribute('open');
    document.getElementById('main').classList.add('visible');
    loadJobs();
    startAutoRefresh();
  } catch {
    WoxToast.error('Invalid credentials');
  }
});

// Allow Enter key on password field
document.getElementById('loginPass').addEventListener('wox-enter', () => {
  document.getElementById('loginBtn').dispatchEvent(new CustomEvent('wox-click'));
});

document.getElementById('logoutBtn').addEventListener('wox-click', async () => {
  await api('POST', '/admin/logout');
  location.reload();
});

// ── Jobs ─────────────────────────────────────────────────────────────────────

async function loadJobs() {
  try {
    allJobs = await api('GET', '/admin/jobs');
    // Drop selections that refer to jobs no longer present
    const ids = new Set(allJobs.map(j => j.id));
    for (const id of selectedIds) if (!ids.has(id)) selectedIds.delete(id);
    renderJobs();
    const running = allJobs.filter(j => j.status === 'running').length;
    const pending = allJobs.filter(j => j.status === 'pending').length;
    document.getElementById('jobsStatus').textContent =
      `${allJobs.length} total · ${running} running · ${pending} queued`;
    document.getElementById('statusLeft').textContent =
      `${allJobs.length} jobs`;
  } catch (e) {
    WoxToast.error(`Failed to load jobs: ${e.message}`);
  }
}

/**
 * Returns the slice of jobs for the current page, clamping page bounds.
 * pageSize === 0 means "show all".
 */
function getPagedJobs() {
  if (pageSize === 0) return { jobs: allJobs, totalPages: 1 };
  const totalPages = Math.max(1, Math.ceil(allJobs.length / pageSize));
  if (currentPage > totalPages) currentPage = totalPages;
  if (currentPage < 1) currentPage = 1;
  const start = (currentPage - 1) * pageSize;
  return { jobs: allJobs.slice(start, start + pageSize), totalPages };
}

function renderJobs() {
  const { jobs, totalPages } = getPagedJobs();
  const tbody = document.getElementById('jobsBody');
  tbody.innerHTML = '';
  for (const j of jobs) {
    const tr = document.createElement('tr');
    const checked = selectedIds.has(j.id) ? 'checked' : '';
    tr.innerHTML = `
      <td class="col-check-cell"><input type="checkbox" class="row-check" data-id="${esc(j.id)}" ${checked}></td>
      <td style="font-family:var(--wox-font-mono);font-size:var(--wox-font-size-sm)">${esc(j.id.slice(0, 8))}</td>
      <td>${esc(j.wow3a_name)}</td>
      <td><span class="badge-status s-${j.status}">${j.status}</span></td>
      <td>${j.status === 'running' ? j.progress + '%' : '—'}</td>
      <td style="color:var(--wox-text-secondary)">${fmtDate(j.created_at)}</td>
      <td>${fmtRunningTime(j)}</td>
      <td>${fmtDuration(j.started_at, j.completed_at)}</td>
      <td style="display:flex;gap:4px;flex-wrap:wrap">
        ${j.status === 'completed'
          ? `<button class="btn-action" data-action="download" data-id="${esc(j.id)}" data-name="${esc(j.wow3a_name)}">Download</button>`
          : ''}
        ${j.status === 'running' || j.status === 'pending'
          ? `<button class="btn-action btn-danger" data-action="kill-job" data-id="${esc(j.id)}">Kill</button>`
          : ''}
        <button class="btn-action btn-danger" data-action="delete-job" data-id="${esc(j.id)}">Delete</button>
      </td>
    `;
    tbody.appendChild(tr);
  }
  document.getElementById('pageInfo').textContent =
    pageSize === 0 ? `All (${allJobs.length})` : `${currentPage} / ${totalPages}`;
  document.getElementById('prevPageBtn').toggleAttribute('disabled', pageSize === 0 || currentPage <= 1);
  document.getElementById('nextPageBtn').toggleAttribute('disabled', pageSize === 0 || currentPage >= totalPages);
  updateSelectionUI();
}

/** Sync the master checkbox + bulk delete button with current selection */
function updateSelectionUI() {
  const { jobs } = getPagedJobs();
  const btn = document.getElementById('bulkDeleteBtn');
  document.getElementById('bulkCount').textContent = selectedIds.size;
  btn.disabled = selectedIds.size === 0;
  const master = document.getElementById('selectAll');
  if (jobs.length === 0) {
    master.checked = false;
    master.indeterminate = false;
    return;
  }
  const selectedOnPage = jobs.filter(j => selectedIds.has(j.id)).length;
  master.checked = selectedOnPage === jobs.length;
  master.indeterminate = selectedOnPage > 0 && selectedOnPage < jobs.length;
}

async function onJobAction(e) {
  const btn = e.target.closest('[data-action]');
  if (!btn) return;
  if (btn.dataset.action === 'download') {
    const a = document.createElement('a');
    a.href = `/admin/jobs/${btn.dataset.id}/result`;
    a.download = btn.dataset.name.replace('.wow3a', '.mp4');
    a.click();
  }
  if (btn.dataset.action === 'delete-job') {
    const confirmed = await confirm(`Delete job ${btn.dataset.id.slice(0, 8)}?`);
    if (!confirmed) return;
    try {
      await api('DELETE', `/admin/jobs/${btn.dataset.id}`);
      WoxToast.success('Job deleted');
      loadJobs();
    } catch (err) {
      WoxToast.error(err.message);
    }
  }
  if (btn.dataset.action === 'kill-job') {
    const confirmed = await confirm(`Kill job ${btn.dataset.id.slice(0, 8)}? The render will be aborted.`);
    if (!confirmed) return;
    try {
      await api('POST', `/admin/jobs/${btn.dataset.id}/kill`);
      WoxToast.success('Job aborted');
      loadJobs();
    } catch (err) {
      WoxToast.error(err.message);
    }
  }
}

document.getElementById('refreshBtn').addEventListener('wox-click', loadJobs);

// ── Pagination & bulk selection ──────────────────────────────────────────────

// Checkbox clicks (delegated, attached once)
document.getElementById('jobsBody').addEventListener('click', onJobAction);
document.getElementById('jobsBody').addEventListener('change', (e) => {
  const cb = e.target.closest('.row-check');
  if (!cb) return;
  if (cb.checked) selectedIds.add(cb.dataset.id);
  else selectedIds.delete(cb.dataset.id);
  updateSelectionUI();
});

// Master checkbox: toggle all rows on current page
document.getElementById('selectAll').addEventListener('change', (e) => {
  const { jobs } = getPagedJobs();
  if (e.target.checked) for (const j of jobs) selectedIds.add(j.id);
  else for (const j of jobs) selectedIds.delete(j.id);
  renderJobs();
});

// Page size selector — persist to localStorage
const pageSizeSel = document.getElementById('pageSize');
pageSizeSel.value = String(pageSize);
pageSizeSel.addEventListener('change', (e) => {
  pageSize = Number(e.target.value);
  localStorage.setItem('wow3_pageSize', String(pageSize));
  currentPage = 1;
  renderJobs();
});

document.getElementById('prevPageBtn').addEventListener('wox-click', () => {
  if (currentPage > 1) { currentPage--; renderJobs(); }
});
document.getElementById('nextPageBtn').addEventListener('wox-click', () => {
  const { totalPages } = getPagedJobs();
  if (currentPage < totalPages) { currentPage++; renderJobs(); }
});

// Bulk delete
document.getElementById('bulkDeleteBtn').addEventListener('click', async () => {
  if (selectedIds.size === 0) return;
  const confirmed = await confirm(`Delete ${selectedIds.size} selected job(s)? This cannot be undone.`);
  if (!confirmed) return;
  const ids = [...selectedIds];
  const results = await Promise.allSettled(
    ids.map(id => api('DELETE', `/admin/jobs/${id}`))
  );
  const failed = results.filter(r => r.status === 'rejected').length;
  const ok = results.length - failed;
  selectedIds.clear();
  if (failed === 0) WoxToast.success(`Deleted ${ok} job(s)`);
  else WoxToast.warning(`Deleted ${ok}, failed ${failed}`);
  loadJobs();
});

// ── API Keys ─────────────────────────────────────────────────────────────────

async function loadKeys() {
  try {
    const keys = await api('GET', '/admin/api-keys');
    renderKeys(keys);
  } catch (e) {
    WoxToast.error(`Failed to load API keys: ${e.message}`);
  }
}

function renderKeys(keys) {
  const tbody = document.getElementById('keysBody');
  tbody.innerHTML = '';
  for (const k of keys) {
    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td>${esc(k.label)}</td>
      <td style="color:var(--wox-text-secondary)">${fmtDate(k.created_at)}</td>
      <td>
        <button class="btn-action btn-danger" data-action="delete-key" data-id="${esc(k.id)}" data-label="${esc(k.label)}">Delete</button>
      </td>
    `;
    tbody.appendChild(tr);
  }
  tbody.addEventListener('click', onKeyAction);
}

async function onKeyAction(e) {
  const btn = e.target.closest('[data-action]');
  if (!btn || btn.dataset.action !== 'delete-key') return;
  const confirmed = await confirm(`Delete API key "${btn.dataset.label}"?`);
  if (!confirmed) return;
  try {
    await api('DELETE', `/admin/api-keys/${btn.dataset.id}`);
    WoxToast.success('API key deleted');
    loadKeys();
  } catch (err) {
    WoxToast.error(err.message);
  }
}

// New key flow
document.getElementById('newKeyBtn').addEventListener('wox-click', () => {
  document.getElementById('keyLabel').value = '';
  document.getElementById('newKeyModal').setAttribute('open', '');
});

document.getElementById('newKeyCancel').addEventListener('wox-click', () => {
  document.getElementById('newKeyModal').removeAttribute('open');
});

document.getElementById('newKeyConfirm').addEventListener('wox-click', async () => {
  const label = document.getElementById('keyLabel').value.trim();
  if (!label) { WoxToast.warning('Label is required'); return; }
  try {
    const { key } = await api('POST', '/admin/api-keys', { label });
    document.getElementById('newKeyModal').removeAttribute('open');
    document.getElementById('createdKeyValue').value = key;
    document.getElementById('createdKeyModal').setAttribute('open', '');
    loadKeys();
  } catch (err) {
    WoxToast.error(err.message);
  }
});

document.getElementById('copyKeyBtn').addEventListener('wox-click', () => {
  const val = document.getElementById('createdKeyValue').value;
  navigator.clipboard.writeText(val).then(() => WoxToast.success('Key copied to clipboard!'));
});

document.getElementById('createdKeyClose').addEventListener('wox-click', () => {
  document.getElementById('createdKeyModal').removeAttribute('open');
});

// ── Tab switching ────────────────────────────────────────────────────────────

document.getElementById('tabs').addEventListener('wox-tab-change', (e) => {
  if (e.detail.name === 'keys') loadKeys();
  if (e.detail.name === 'jobs') loadJobs();
});

// ── Auto refresh ─────────────────────────────────────────────────────────────

function startAutoRefresh() {
  if (refreshTimer) clearInterval(refreshTimer);
  refreshTimer = setInterval(() => {
    if (document.getElementById('tabs').getAttribute('active') === 'jobs') {
      loadJobs();
    }
  }, 10000);
}
</script>
</body>
</html>
